name: Lint & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r open-claw-workspace/requirements.txt

      - name: Ruff lint
        run: ruff check open-claw-workspace/

      - name: Ruff format check
        run: ruff format --check open-claw-workspace/

      - name: Mypy type check
        run: mypy open-claw-workspace/core/
