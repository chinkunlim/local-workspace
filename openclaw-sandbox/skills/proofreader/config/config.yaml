# ==============================================================================
# config.yaml — OpenClaw Proofreader Skill Configuration
# ==============================================================================

paths:
  input: "input"
  output: "output"
  state: "state"
  logs: "logs"

  phases:
    p1: "output/01_doc_proofread"
    p2: "output/02_transcript_proofread"
    p3: "output/03_doc_completeness"

# phase1 uses default gemma options right now (no special config section needed yet)

phase2:
  active_profile: strict_gemma
  profiles:
    strict_gemma:
      model: gemma4:e4b
      chunk_size: 3000
      options:
        num_ctx: 16384
        temperature: 0
        num_predict: 4096

phase3:
  active_profile: strict_gemma
  profiles:
    strict_gemma:
      model: gemma4:e4b
      chunk_size: 4000
      options:
        num_ctx: 16384
        temperature: 0
        num_predict: 4096

verification_gate:
  enabled: true
