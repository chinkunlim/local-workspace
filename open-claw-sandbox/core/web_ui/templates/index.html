<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Claw Knowledge Brain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Glassmorphism Container */
        .container {
            width: 100%;
            max-width: 800px;
            margin-top: 10vh;
            padding: 2rem;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        h1 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        /* Focus Search Area */
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text);
            font-size: 1.1rem;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        button {
            background: var(--border);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(255,255,255,0.1);
        }

        button.primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        button.primary:hover {
            background: #7dd3fc;
        }

        /* Response Area */
        #response-area {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            display: none;
            line-height: 1.6;
        }

        /* Skills Panel */
        .skills-panel {
            margin-top: 3rem;
            border-top: 1px solid var(--border);
            padding-top: 2rem;
        }

        .skill-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .skill-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skill-card button {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Open Claw Brain</h1>
        
        <div class="search-box">
            <textarea id="query-input" placeholder="問我任何知識庫內的問題，或是輸入「請比較 A 和 B」..."></textarea>
            <div class="actions">
                <button onclick="submitQuery('compare')">交叉比對 (Compare)</button>
                <button class="primary" onclick="submitQuery('rag')">詢問知識庫 (RAG)</button>
            </div>
        </div>

        <div id="response-area"></div>

        <div class="skills-panel">
            <h3 style="color: var(--text-muted); font-weight: 400; margin-bottom: 1rem;">技能管線狀態</h3>
            <div class="skill-list" id="skill-list">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            const res = await fetch('/api/status');
            const data = await res.json();
            const list = document.getElementById('skill-list');
            list.innerHTML = '';
            
            for (const [skillName, info] of Object.entries(data.skills)) {
                list.innerHTML += `
                    <div class="skill-card">
                        <div>
                            <strong>${skillName}</strong><br>
                            <span style="color: var(--text-muted); font-size: 0.85rem;">已處理 ${info.total_files} 個檔案</span>
                        </div>
                        <button onclick="runSkill('${skillName}')">執行管線</button>
                    </div>
                `;
            }
        }

        async function runSkill(skillName) {
            await fetch('/api/start', {
                method: 'POST',
                body: JSON.stringify({ skill: skillName })
            });
            alert(`已觸發 ${skillName} 管線！請在背景查看終端機進度。`);
            fetchStatus();
        }

        async function submitQuery(mode) {
            const query = document.getElementById('query-input').value;
            const resArea = document.getElementById('response-area');
            
            if(!query) return;
            
            resArea.style.display = 'block';
            resArea.innerHTML = '<span style="color: var(--accent);">🤔 大腦運算中...</span>';
            
            const res = await fetch('/api/query', {
                method: 'POST',
                body: JSON.stringify({ query, mode })
            });
            const data = await res.json();
            
            if (data.success) {
                if(mode === 'rag') {
                    // Quick markdown formatting for bold and newlines
                    let htmlText = data.answer.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    htmlText = htmlText.replace(/\n/g, '<br>');
                    resArea.innerHTML = htmlText;
                } else {
                    resArea.innerHTML = `<span style="color: #4ade80;">✅ ${data.message}</span>`;
                }
            } else {
                resArea.innerHTML = `<span style="color: #f87171;">❌ 發生錯誤: ${data.error}</span>`;
            }
        }

        fetchStatus();
    </script>
</body>
</html>
