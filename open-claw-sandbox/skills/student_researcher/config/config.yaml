# config/config.yaml for student_researcher
model_profile: default
models:
  default:
    name: "deepseek-r1:8b"  # primary — CoT reasoning for academic claim extraction
    fallback: "qwen3:8b"    # fallback
    temperature: 0.0

directories:
  input: "data/student_researcher/input"
  output: "data/student_researcher/output"
  state: "data/student_researcher/state"

phases:
  p01_claim_extraction:
    enabled: true
  p02_synthesis:
    enabled: true
