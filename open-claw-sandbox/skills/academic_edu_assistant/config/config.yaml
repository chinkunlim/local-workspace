paths:
  input: "input"
  output: "output"
  state: "state"
  logs: "logs"
  phases:
    p0: "input"
    p1: "output/01_comparison"
    p2: "output/02_anki"

models:
  default: "qwen3:14b"     # primary — best quality for concept comparison & Anki
  fallback: "qwen3:8b"     # fallback — circuit breaker / OOM

options:
  chunk_size: 4000
  temperature: 0.2

runtime:
  ollama:
    api_url: "http://127.0.0.1:11434/api/generate"
    timeout_seconds: 600
    retries: 3
    backoff_seconds: 5

# AnkiConnect Integration (#9)
# Set enabled: true and ensure Anki is running with the AnkiConnect add-on installed.
ankiconnect:
  enabled: false                    # Flip to true to activate auto-push
  url: "http://127.0.0.1:8765"
  deck: "OpenClaw::Academic"        # Parent deck; subject name appended automatically
  note_model: "Basic"               # Anki note type (Front/Back fields required)

# P2-2: Proactive RSS / Atom Feed Configuration
# Used by skills/academic_edu_assistant/scripts/phases/p00_rss_ingest.py
# Schedule via: /schedule add rss_daily "0 7 * * *" academic_edu_assistant 每日論文擷取
rss:
  download_pdfs: true
  max_items_default: 5
  dedupe_file: "state/rss_seen.jsonl"
  feeds:
    - name: "arXiv cs.AI"
      url: "https://arxiv.org/rss/cs.AI"
      subject: "ComputerScience"
      max_items: 5
    - name: "arXiv cs.LG"
      url: "https://arxiv.org/rss/cs.LG"
      subject: "ComputerScience"
      max_items: 3
    - name: "arXiv cs.CL"
      url: "https://arxiv.org/rss/cs.CL"
      subject: "NLP"
      max_items: 3
    # Uncomment and add your own feeds:
    # - name: "Nature Machine Intelligence"
    #   url: "https://www.nature.com/natmachintell.rss"
    #   subject: "NaturePapers"
    #   max_items: 3
