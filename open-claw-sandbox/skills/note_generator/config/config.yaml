# ==============================================================================
# config.yaml — NoteGenerator Skill Configuration
# ==============================================================================

# Paths managed by core.PathBuilder (base: data/note-generator/)
paths:
  input: "input"
  output: "output"
  state: "state"
  logs: "logs"
  phases:
    output: "output"

# ------------------------------------------------------------------------------
# Synthesize profiles
# ------------------------------------------------------------------------------
synthesize:
  active_profile: qwen3_reasoning   # primary: best quality synthesis
  profiles:
    default:
      # model: gemma3:12b
      model: gemma4:e4b
      chunk_threshold: 5000
      map_chunk_size: 4000
      mermaid_retry_max: 2
      content_loss_threshold: 0.01
      options:
        num_ctx: 16384
        temperature: 0.1

    # reasoning (deepseek-r1:14b) — commented out, replaced by phi4_reasoning
    # reasoning:
    #   model: deepseek-r1:14b
    #   chunk_threshold: 5000
    #   map_chunk_size: 4000
    #   mermaid_retry_max: 2
    #   content_loss_threshold: 0.01
    #   options:
    #     num_ctx: 32768
    #     temperature: 0.2
    #     num_predict: 8192

    # phi4_reasoning — FALLBACK: faster, lower RAM, good for quick runs
    phi4_reasoning:
      model: phi4-mini-reasoning
      chunk_threshold: 8000
      map_chunk_size: 6000
      mermaid_retry_max: 2
      content_loss_threshold: 0.01
      options:
        num_ctx: 32768
        temperature: 0.1
        num_predict: 8192

    # qwen3_reasoning — PRIMARY: best synthesis quality (quality-first)
    qwen3_reasoning:
      model: qwen3:14b
      chunk_threshold: 6000
      map_chunk_size: 5000
      mermaid_retry_max: 3
      content_loss_threshold: 0.01
      options:
        num_ctx: 32768
        temperature: 0.1
        num_predict: 8192

runtime:
  ollama:
    api_url: "http://127.0.0.1:11434/api/generate"
    timeout_seconds: 600
    retries: 3
    backoff_seconds: 5
