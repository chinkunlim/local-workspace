# ==============================================================================
# config.yaml — OpenClaw Voice Memo Skill Configuration
# ==============================================================================

# ------------------------------------------------------------------------------
# Paths (Relative to data/voice-memo/ — managed by core.PathBuilder)
# All values here are relative to the skill's base_dir.
# Canonical keys (input, output, state, logs) are required by PipelineBase.
# Keys under `phases` become self.dirs[key] in every Phase script.
# ------------------------------------------------------------------------------
paths:
  # Canonical directory layout
  input:  "input"
  output: "output"
  state:  "state"
  logs:   "logs"

  # Phase-specific directories (self.dirs[key] in Phase scripts)
  phases:
    p0: "input"                        # 00 — 原始音檔
    p1: "output/01_transcript"         # 01 — Whisper 轉錄稿
    p2: "output/02_proofread"          # 02 — AI 校對稿
    p3: "output/03_merged"             # 03 — 跨段合併精煉
    p4: "output/04_highlighted"        # 04 — 重點標記
    p5: "output/05_notion_synthesis"   # 05 — Notion 知識合成

phase0:
  active_profile: priority_gemma
  profiles:
    priority_gemma:
      # model: qwen2.5:14b
      model: gemma3:12b
      options:
        num_ctx: 16384
        temperature: 0.1

phase1:
  active_profile: apple_silicon_mps
  profiles:
    default:
      engine: faster-whisper
      model: medium
      device: cpu
      compute_type: int8
      beam_size: 5
    apple_silicon_mps:
      engine: mlx-whisper
      model: mlx-community/whisper-large-v3-mlx
      device: mps

phase2:
  active_profile: strict_gemma
  profiles:
    strict_gemma:
      # model: qwen3:14b
      # model: llama3:8b
      model: gemma3:12b
      chunk_size: 3000
      options:
        num_ctx: 16384
        temperature: 0
        num_predict: 4096

phase3:
  active_profile: default
  profiles:
    default:
      # model: qwen3:14b
      # model: gemma4:e2b
      model: gemma3:12b
      chunk_size: 4000
      options:
        num_ctx: 16384
        temperature: 0.2
        num_predict: 4096

phase4:
  active_profile: default
  profiles:
    default:
      # model: qwen3:8b
      model: gemma3:12b
      chunk_size: 3000
      options:
        num_ctx: 8192
        temperature: 0.1

phase5:
  active_profile: reasoning_deepseek
  profiles:
    default:
      model: gemma3:12b
      chunk_threshold: 6000
      map_chunk_size: 4000
      options:
        num_ctx: 16384
        temperature: 0.4
    reasoning_deepseek:
      # model: qwen3:14b
      model: deepseek-r1:14b
      chunk_threshold: 6000
      map_chunk_size: 4000
      options:
        num_ctx: 32768
        temperature: 0.6
        num_predict: 8192

runtime:
  ollama:
    api_url: "http://127.0.0.1:11434/api/generate"
    timeout_seconds: 600
    retries: 3
    backoff_seconds: 5


# NOTE: hardware thresholds and runtime (ollama) settings are defined globally in:
#   open-claw-workspace/core/config/global.yaml
# Override any value here only if this skill needs different thresholds.
#   e.g. disk.min_free_mb: 200 was previously lower here for voice-memo.

thresholds:
  phase2_verbatim: 0.85
  phase3_verbatim: 0.70
  phase4_verbatim: 0.95
context:
  phase2_lookback_chars: 200
  phase3_lookback_chars: 150
  phase5_mermaid_retry_max: 2
